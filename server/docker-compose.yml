services:
  redis:
    image: redis:7-alpine
    container_name: judge_redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped

  worker:
    build: .
    container_name: judge_worker
    command: npm run start:worker
    env_file:
      - .env
    environment:
      - KUBECONFIG=/home/node/.kube/config
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
    volumes:
      - ${USERPROFILE}/.kube/config:/home/node/.kube/config:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data: